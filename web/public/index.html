<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Racesow · Warsow Race Records</title>
  <meta name="description" content="Live world records, maps and player rankings from Warsow race servers.">
  <!-- og -->
  <meta property="og:site_name" content="Racesow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Racesow · Warsow Race Records">
  <meta property="og:description" content="Live world records, maps and player rankings from Warsow race servers.">
  <meta property="og:image" content="/assets/img/warsow-logo.png">
  <meta name="twitter:card" content="summary">
  <!-- /og -->
  <link rel="icon" href="/assets/img/warsow-logo.png">
  <link rel="stylesheet" href="/assets/css/style.css">
  <!-- Vendored three.js (no build step; CSP blocks CDNs). The replay viewer
       (assets/js/replay.js) is dynamically imported and resolves "three"
       through this map; OrbitControls imports "three" internally. -->
  <script type="importmap">
  {
    "imports": {
      "three": "/assets/vendor/three/three.module.js",
      "three/addons/controls/OrbitControls.js": "/assets/vendor/three/OrbitControls.js",
      "three/addons/loaders/GLTFLoader.js": "/assets/vendor/three/GLTFLoader.js"
    }
  }
  </script>
</head>
<body>
  <header class="site">
    <div class="header-inner">
      <div class="brand" data-nav="#/">
        <img src="/assets/img/warsow-logo.png" alt="Warsow">
        <div>
          <div class="wordmark">RACE<b>SOW</b></div>
          <div class="tag">GO FAST · RACE RECORDS</div>
        </div>
      </div>
      <nav class="main">
        <a data-nav="#/" href="/">Overview</a>
        <a data-nav="#/maps" href="/maps">Maps</a>
        <a data-nav="#/players" href="/players">Players</a>
        <a data-nav="#/live" href="/live">Live<span class="livedot" aria-hidden="true"></span></a>
        <a data-nav="#/about" href="/about">About</a>
      </nav>
      <div class="gsearch">
        <span class="ico">⌕</span>
        <input id="gsearch" type="text" placeholder="Search maps &amp; players…" autocomplete="off">
        <div class="results" id="gresults"></div>
      </div>
    </div>
    <div class="streaks"></div>
  </header>

  <main id="app">
    <div class="loading"><span class="spinner"></span></div>
  </main>

  <footer class="site">
    <div class="fi">
      <div>Seeded from the livesow database · growing live from Warsow race servers.</div>
      <div id="foot-updated"></div>
    </div>
  </footer>

  <script src="/assets/js/app.js"></script>
</body>
</html>
