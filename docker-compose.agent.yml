# Racesow game-server AGENT bundle.
#
# For operators who want to run a Warsow race server that feeds records to
# SOMEONE ELSE'S central stats site. This runs just the game server + the
# collector; it needs no database, no Git-LFS, and no clone of the central web
# app — only this file, the server/ build context, and a small .env.
#
#   1. Get a per-server INGEST_TOKEN from the central site admin.
#   2. Copy .env.example -> .env and set INGEST_URL, INGEST_TOKEN, SERVER_NAME.
#   3. docker compose -f docker-compose.agent.yml up -d --build
#
# See AGENT.md for the full walkthrough (including the stock-server, no-fork
# "topscores only" tier).
# Bounded container logs (json-file has no cap by default; the engine console
# is chatty). Applied on the next container recreate.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  warsow-race:
    build:
      context: ./server
    image: warsow-race:2.1.2
    container_name: warsow-race
    restart: unless-stopped
    logging: *default-logging
    # Line-buffer the engine's stdout so `docker logs` isn't frozen mid-startup
    # (glibc block-buffers a pipe); entrypoint.sh also wraps launch in stdbuf.
    tty: true
    # A full livesow map mirror is 4000+ pk3s the engine holds open at once,
    # past the default 2048-fd soft limit ("Error opening PK3 file").
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    ports:
      - "${SV_PORT:-44400}:44400/udp"
      # Cross-server player-mesh port. Published so peers on OTHER hosts can
      # reach this server's mirror; harmless (nothing binds it) when MIRROR_*
      # is unset. Same-host peers don't need it.
      - "${MIRROR_PORT:-44450}:44450/udp"
    environment:
      SV_HOSTNAME: "${SV_HOSTNAME:-Racesow Community Server}"
      SV_MAXCLIENTS: "${SV_MAXCLIENTS:-16}"
      SV_PUBLIC: "${SV_PUBLIC:-1}"
      G_GAMETYPE: "hrace"
      MAP_ROTATION: "2"
      RCON_PASSWORD: "${RCON_PASSWORD:-}"
      # The gametype POSTs every finish straight to the central ingest
      # endpoint (racelog.as -> RS_ApiReportRace).
      INGEST_URL: "${INGEST_URL:?set INGEST_URL in .env}"
      INGEST_TOKEN: "${INGEST_TOKEN:?set INGEST_TOKEN in .env}"
      VERSION_NAME: "${VERSION_NAME:-wsw 2.1}"
      # Ship the game console to the central site's admin log view. LOG_SHIP=0 off.
      LOG_SHIP: "${LOG_SHIP:-1}"
      # Client-reachable HTTP pak mirror (optional; see server/docker-compose.yml).
      SV_UPLOADS_BASEURL: "${SV_UPLOADS_BASEURL:-}"
      # Cross-server player mirroring (UDP mesh). Peers exchange live player
      # positions + chat so players on one server see the others as ghosts.
      # Set all of these in .env; empty MIRROR_PEERS = feature off.
      MIRROR_PEERS: "${MIRROR_PEERS:-}"     # "peer-host:44450 other-host:44450"
      MIRROR_SECRET: "${MIRROR_SECRET:-}"   # shared HMAC key: openssl rand -hex 24
      MIRROR_PORT: "${MIRROR_PORT:-44450}"
      MIRROR_TAG: "${MIRROR_TAG:-}"         # short id shown as [TAG] in chat
    volumes:
      - ./server/maps:/warsow/maps_extra:ro
      # Local record files (topscores) + finish-event audit log, persisted
      # across container rebuilds.
      - racelog:/warsow/racemod/racelog
      - topscores:/warsow/racemod/topscores
      # WR replay demos (.wd files under demos/server/<map>/). Without this
      # volume they land in the container's overlay layer: lost on every
      # recreate and growing that layer without bound (the full-tier compose
      # has always mounted ./demos for exactly this reason).
      - demos:/warsow/racemod/demos
      # Downloadable pk3s are exported here at startup for the pakserver below.
      - pakshare:/pakshare

  # Optional plain-HTTP pak mirror so LOCAL players download maps from THIS
  # server instead of the central site (fast, no cross-region transfer). Start
  # it with the httpdl profile and point clients at it:
  #   docker compose -f docker-compose.agent.yml --profile httpdl up -d --build
  #   SV_UPLOADS_BASEURL=http://your-host:44445   (in .env)
  # The port must be reachable by every player (the engine won't fall back to
  # UDP after a failed web download), so publish it on 0.0.0.0 and open it.
  pakserver:
    image: nginx:alpine
    container_name: racesow-pakserver
    restart: unless-stopped
    logging: *default-logging
    profiles: ["httpdl"]
    ports:
      - "${PAK_HTTP_PORT:-44445}:80"
    volumes:
      - pakshare:/usr/share/nginx/html
    # On start: (1) hide the nginx version in the Server header — this port is
    # internet-facing (server_tokens off, dropped into the http-context
    # conf.d include); (2) chown the share to the game-server user (uid 999)
    # so the export works even if this container initialised the volume first.
    command: ["/bin/sh", "-c", "printf 'server_tokens off;\\n' > /etc/nginx/conf.d/security.conf; chown -R 999:999 /usr/share/nginx/html 2>/dev/null || true; exec nginx -g 'daemon off;'"]

  # No collector service: the gametype POSTs finishes to the central API
  # directly (RS_ApiReportRace). If you instead run a stock, unmodified race
  # server, see AGENT.md "basic tier" for the standalone collector.

volumes:
  racelog:
  topscores:
  demos:
  pakshare:
