# Racesow game-server AGENT bundle.
#
# For operators who want to run a Warsow race server that feeds records to
# SOMEONE ELSE'S central stats site. This runs just the game server + the
# collector; it needs no database, no Git-LFS, and no clone of the central web
# app — only this file, the server/ build context, and a small .env.
#
#   1. Get a per-server INGEST_TOKEN from the central site admin.
#   2. Copy .env.example -> .env and set INGEST_URL, INGEST_TOKEN, SERVER_NAME.
#   3. docker compose -f docker-compose.agent.yml up -d --build
#
# See AGENT.md for the full walkthrough (including the stock-server, no-fork
# "topscores only" tier).
services:
  warsow-race:
    build:
      context: ./server
    image: warsow-race:2.1.2
    container_name: warsow-race
    restart: unless-stopped
    ports:
      - "${SV_PORT:-44400}:44400/udp"
    environment:
      SV_HOSTNAME: "${SV_HOSTNAME:-Racesow Community Server}"
      SV_MAXCLIENTS: "${SV_MAXCLIENTS:-16}"
      SV_PUBLIC: "${SV_PUBLIC:-1}"
      G_GAMETYPE: "hrace"
      MAP_ROTATION: "2"
      RCON_PASSWORD: "${RCON_PASSWORD:-}"
      # The gametype POSTs every finish straight to the central ingest
      # endpoint (racelog.as -> RS_ApiReportRace). The collector below then
      # only backfills from topscores files.
      INGEST_URL: "${INGEST_URL:?set INGEST_URL in .env}"
      INGEST_TOKEN: "${INGEST_TOKEN:?set INGEST_TOKEN in .env}"
      VERSION_NAME: "${VERSION_NAME:-wsw 2.1}"
    volumes:
      - ./server/maps:/warsow/maps_extra:ro
      # Local record files (topscores) + finish-event audit log, persisted
      # across container rebuilds.
      - racelog:/warsow/racemod/racelog
      - topscores:/warsow/racemod/topscores

  # No collector service: the gametype POSTs finishes to the central API
  # directly (RS_ApiReportRace). If you instead run a stock, unmodified race
  # server, see AGENT.md "basic tier" for the standalone collector.

volumes:
  racelog:
  topscores:
