# Production nginx site for the central stats box (eu.frankfurt.racesow.org).
# Deployed to /etc/nginx/sites-available/racesow — versioned here so the
# rate limits and pak-download routing that game servers depend on are
# reviewable. Certs come from certbot (webroot /var/www/letsencrypt).
#
# Racesow stats site + API + game pak mirror — eu.frankfurt.racesow.org

# Per-IP request budget for the API: the site's pages fan out a handful of
# API calls, so 20r/s with a burst of 40 absorbs normal loads while capping
# scrapers and abuse.
limit_req_zone $binary_remote_addr zone=racesow_api:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name eu.frankfurt.racesow.org;

    # ACME HTTP-01 renewals (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Fast pak downloads for game clients — deliberately plain HTTP: the 2018
    # Warsow engine's downloader does not speak TLS. Proxies the loopback-bound
    # pakserver container serving the pakshare volume.
    location /racemod/ {
        proxy_pass http://127.0.0.1:44445;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Everything else is the website/API -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eu.frankfurt.racesow.org;

    ssl_certificate     /etc/letsencrypt/live/eu.frankfurt.racesow.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eu.frankfurt.racesow.org/privkey.pem;

    # TLS hardening (Mozilla "intermediate" profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:racesow_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # style-src keeps 'unsafe-inline': the frontend templates inline style
    # attributes. Scripts stay 'self'-only, which is the load-bearing part.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # /api/ingest accepts up to 2 MB JSON batches (web/server.js)
    client_max_body_size 3m;

    gzip on;
    gzip_types application/json text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        limit_req zone=racesow_api burst=40 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
