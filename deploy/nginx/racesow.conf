# Production nginx site for the central stats box (eu.frankfurt.racesow.org).
# Deployed to /etc/nginx/sites-available/racesow — versioned here so the
# rate limits and pak-download routing that game servers depend on are
# reviewable. Certs come from certbot (webroot /var/www/letsencrypt).
#
# Racesow stats site + API + game pak mirror — eu.frankfurt.racesow.org

# Per-IP request budget for the API: the site's pages fan out a handful of
# API calls, so 20r/s with a burst of 40 absorbs normal loads while capping
# scrapers and abuse.
limit_req_zone $binary_remote_addr zone=racesow_api:10m rate=20r/s;
# Tighter budget for the server-rendered routes (/player/:id, /og/player/:id.png):
# each does synchronous DB work + a resvg PNG rasterization that blocks the
# single Node event loop, so an unthrottled distinct-id flood there can stall
# the whole site. 3r/s (burst 10) is ample for crawlers/users viewing cards.
limit_req_zone $binary_remote_addr zone=racesow_render:10m rate=3r/s;
# WR demo downloads are multi-MB .wd files served off the pak mirror; keep the
# budget low so they can't be used to hammer the box.
limit_req_zone $binary_remote_addr zone=racesow_demo:10m rate=2r/s;

# Per-IP concurrent-connection cap (slowloris / socket-exhaustion backstop).
# Keyed on $binary_remote_addr, which real_ip below rewrites to the true
# visitor, so one abusive client can't hold open a pile of sockets.
limit_conn_zone $binary_remote_addr zone=racesow_conn:10m;

# --- Cloudflare real-IP restoration ------------------------------------------
# The site is fronted by Cloudflare, so the TCP peer is always a CF edge. Trust
# those edges and take the visitor's real address from CF-Connecting-IP, so
# rate/conn limits, access logs and the app's req.ip key on the actual client
# rather than lumping everyone behind a handful of CF IPs. Requests NOT from a
# CF range (a direct-to-origin attacker forging the header) are ignored, so this
# cannot be used to spoof an IP. Refresh from https://www.cloudflare.com/ips-v4
# and ips-v6 (rarely changes); the origin is also firewalled to these ranges.
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;
real_ip_header CF-Connecting-IP;

# Two web replicas for ZERO-DOWNTIME rolling deploys (scripts/rolling-deploy.sh
# recreates them one at a time). nginx passively health-checks each backend and
# skips one that is briefly down during its recreate, so there is always a
# healthy instance to serve. proxy_next_upstream retries a failed idempotent
# request on the peer; non-idempotent POSTs (/api/ingest) are NOT retried (the
# game module has its own retry queue), so an ingest is never double-processed.
upstream racesow_web {
    server 127.0.0.1:8080 max_fails=2 fail_timeout=5s;
    server 127.0.0.1:8081 max_fails=2 fail_timeout=5s;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name eu.frankfurt.racesow.org;

    # ACME HTTP-01 renewals (certbot --webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Fast pak downloads for game clients — deliberately plain HTTP: the 2018
    # Warsow engine's downloader does not speak TLS. Proxies the loopback-bound
    # pakserver container serving the pakshare volume.
    location /racemod/ {
        proxy_pass http://127.0.0.1:44445;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # Everything else is the website/API -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eu.frankfurt.racesow.org racesow.org;

    # ACME HTTP-01 renewals: served over HTTPS too (not just port 80) so the
    # challenge validates even if Cloudflare rewrites the request to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Per-IP concurrent connection ceiling + 429 (not 503) for throttle refusals
    # so clients back off instead of treating it as a server error.
    limit_conn racesow_conn 100;
    limit_conn_status 429;
    limit_req_status 429;

    # Anti-slowloris: cap how long a client may dribble out a request or stall a
    # response before nginx drops it, and RST timed-out sockets to free them
    # immediately. Scoped to the website/API vhost (port-80 pak downloads keep
    # generous defaults for slow game-client links). Body window stays wide
    # enough for the up-to-2MB /api/ingest POSTs from game servers.
    client_header_timeout 10s;
    client_body_timeout   15s;
    send_timeout          15s;
    reset_timedout_connection on;

    # Keepalive tuning for the connection pool Cloudflare holds to this origin.
    # Cloudflare reuses idle origin connections for up to ~900s. nginx's 75s
    # default closes an idle pooled connection long before CF gives up on it, so
    # CF's next request lands on a socket nginx already FIN'd: it is either lost
    # before reaching the origin or answered into a torn-down connection. Either
    # way the visitor sees an intermittent timeout that a hard refresh (fresh
    # connection) clears. Holding idle connections longer than CF's window means
    # CF, never nginx, initiates the close — eliminating the reuse race. The
    # high request cap keeps a long-lived pooled connection from being recycled
    # mid-stream (default 1000). These sit under `listen 443` so the plain-HTTP
    # pak-download vhost (game engine clients, not via CF) keeps stock defaults.
    keepalive_timeout 3600s;
    keepalive_requests 100000;

    ssl_certificate     /etc/letsencrypt/live/eu.frankfurt.racesow.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eu.frankfurt.racesow.org/privkey.pem;

    # Cloudflare Authenticated Origin Pulls (mTLS): Cloudflare presents a client
    # cert signed by this CA on every origin pull, so a direct-to-origin
    # connection (no cert) is rejected at the TLS handshake — the origin is
    # CF-only without relying on an IP allowlist. ENFORCED (`on`) after
    # confirming CF sends the cert (X-CF-Client-Verify=SUCCESS on all paths).
    # Only this 443 vhost is gated: port-80 pak downloads (game engine) and SSH
    # stay open; direct admin access to :443 now needs an SSH tunnel / loopback.
    ssl_client_certificate /etc/nginx/cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;

    # TLS hardening (Mozilla "intermediate" profile)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:racesow_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # style-src keeps 'unsafe-inline': the frontend templates inline style
    # attributes. Scripts stay 'self' plus ONE inline-script hash — the replay
    # viewer's <script type="importmap"> in index.html (vendored three.js has no
    # build step / CDN). The hash is over that element's exact text; if the
    # importmap changes, recompute it (see web/public/index.html).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-1nZeeQuZFy8DeLlc/Sm7ji3eRKvl//M1v9yyN658Gu4='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'; form-action 'self'" always;

    # /api/ingest accepts up to 2 MB JSON batches (web/server.js)
    client_max_body_size 3m;

    gzip on;
    gzip_types application/json text/css application/javascript image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        limit_req zone=racesow_api burst=40 nodelay;
        proxy_pass http://racesow_web;
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 2;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    # WR demo downloads (.wd files) — proxied off the loopback pak mirror (the
    # same container that serves game paks). Rate-limited; forces a download.
    # .wdz20 is already gzip-compressed, so re-gzip is disabled.
    location /demos/ {
        limit_req zone=racesow_demo burst=4 nodelay;
        proxy_pass http://127.0.0.1:44445;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        gzip off;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Server-rendered player pages and OG card PNGs: expensive (DB + resvg),
    # so give them the tighter render budget. Matches /player/... and
    # /og/player/....png before the catch-all below.
    location ~ ^/(og/|player/|server/|live) {
        limit_req zone=racesow_render burst=10 nodelay;
        proxy_pass http://racesow_web;
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 2;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        # Backstop budget for the static shell / SPA fallback so no proxied
        # route is entirely unthrottled.
        limit_req zone=racesow_api burst=40 nodelay;
        proxy_pass http://racesow_web;
        proxy_next_upstream error timeout;
        proxy_next_upstream_tries 2;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }
}
