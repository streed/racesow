# Warsow 2.1.2 dedicated race server (hrace / racemod)
#
#   docker compose up -d --build
#
# Warsow uses a single UDP port. Mount ./maps to add maps from the community
# map pack without rebuilding the image.
services:
  warsow-race:
    # The hrace mod source is vendored (forked) at ./racemod — see
    # racemod/UPSTREAM. Local changes there rebuild straight into the image.
    build: .
    image: warsow-race:2.1.2
    container_name: warsow-race
    restart: unless-stopped
    # Allocate a pseudo-TTY so the engine line-buffers stdout. Without it,
    # glibc block-buffers stdout (it's a pipe, not a terminal) and `docker logs`
    # appears frozen mid-startup until ~4 KB accumulates. See entrypoint.sh,
    # which also wraps the launch in stdbuf as a belt-and-suspenders fallback.
    tty: true
    ports:
      # Warsow uses a single UDP port; pk3 downloads also flow over it (the
      # engine's HTTP server is disabled via sv_http 0 in entrypoint.sh).
      - "44400:44400/udp"
    environment:
      SV_HOSTNAME: "${SV_HOSTNAME:-Dockerized Warsow Race - go fast!}"
      SV_MAXCLIENTS: "${SV_MAXCLIENTS:-16}"
      SV_PUBLIC: "${SV_PUBLIC:-0}"   # set to 1 to advertise on the master server list
      SV_PORT: "44400"
      G_GAMETYPE: "hrace"
      MAP_ROTATION: "2"        # 0 none, 1 sequential, 2 random
      # Empty disables rcon. Set it in server/.env (or the shell environment);
      # never commit a real password.
      RCON_PASSWORD: "${RCON_PASSWORD:-}"
      # Optional: client-reachable base URL for HTTP pak downloads — see the
      # pakserver service below. Empty (default) = UDP transfer over the game
      # port, which always works but is slow for big map packs.
      SV_UPLOADS_BASEURL: "${SV_UPLOADS_BASEURL:-}"
      # Direct-to-API race reporting: the gametype POSTs every finish straight
      # to the stats ingest endpoint (no collector needed for the racelog
      # feed). For the co-located stack this container joins the web stack's
      # network (see `networks:` below), so use http://web:8080/api/ingest.
      # Set both in server/.env; token via `node admin.js enroll`.
      INGEST_URL: "${INGEST_URL:-}"
      INGEST_TOKEN: "${INGEST_TOKEN:-}"
      VERSION_NAME: "${VERSION_NAME:-wsw 2.1}"
      # EXTRA_ARGS: "+set sv_maxrate 0"
    networks:
      - default
      # The central stats stack's network (created by the repo-root compose),
      # so INGEST_URL can point at the web service directly.
      - stats
    volumes:
      # Drop extra .pk3 map packs here to expand the rotation (optional).
      # They are symlinked into the mod dir at startup so the engine loads them.
      - ./maps:/warsow/maps_extra:ro
      # Records + race-finish event log written by the mod (fs_usehomedir=0 →
      # everything lands under /warsow/racemod). Bind-mounted so they survive
      # rebuilds and so the stats collector (../docker-compose.yml) can read
      # them. The host dirs must be writable by the container user (uid 999).
      - ./topscores:/warsow/racemod/topscores
      - ./racelog:/warsow/racemod/racelog
      # Persist server-written state (bans, logs) across restarts (optional).
      - warsow-state:/home/warsow/.local/share/warsow-2.1
      # Downloadable pk3s are exported here at startup for the pakserver below.
      - pakshare:/pakshare

  # Optional plain-HTTP pak server for fast client downloads (mainly big map
  # packs; the tiny UI pak is fine over UDP). Start it with:
  #   docker compose --profile httpdl up -d
  # and set SV_UPLOADS_BASEURL to a URL *clients* can reach, e.g.
  #   SV_UPLOADS_BASEURL=http://your-host-or-ip:44445
  # Note: when a base URL is set, clients that cannot reach it will fail
  # downloads entirely (the engine does not fall back to UDP after a failed
  # web attempt) — so only set it if the port is reachable by every player.
  pakserver:
    image: nginx:alpine
    container_name: racesow-pakserver
    restart: unless-stopped
    profiles: ["httpdl"]
    ports:
      - "${PAK_HTTP_PORT:-44445}:80"
    volumes:
      - pakshare:/usr/share/nginx/html
    # Chown the share to the game-server user (uid 999) before serving, so the
    # export works even if this container initialized the volume first.
    command: ["/bin/sh", "-c", "chown -R 999:999 /usr/share/nginx/html 2>/dev/null || true; exec nginx -g 'daemon off;'"]

volumes:
  warsow-state:
  pakshare:

networks:
  stats:
    external: true
    name: racesow_default
