# Warsow 2.1.2 dedicated race server (hrace / racemod)
#
#   docker compose up -d --build
#
# Warsow uses a single UDP port. Mount ./maps to add maps from the community
# map pack without rebuilding the image.
services:
  warsow-race:
    build:
      context: .
      args:
        # Swap to hettoo/wsw-race for the upstream racemod; both build `hrace`.
        RACEMOD_REPO: https://github.com/DenMSC/wsw-race.git
        RACEMOD_BRANCH: racemod
    image: warsow-race:2.1.2
    container_name: warsow-race
    restart: unless-stopped
    ports:
      - "44400:44400/udp"
    environment:
      SV_HOSTNAME: "Dockerized Warsow Race - go fast!"
      SV_MAXCLIENTS: "16"
      SV_PUBLIC: "0"            # set to 1 to advertise on the master server list
      SV_PORT: "44400"
      G_GAMETYPE: "hrace"
      MAP_ROTATION: "2"        # 0 none, 1 sequential, 2 random
      RCON_PASSWORD: "change-me-please"
      # EXTRA_ARGS: "+set sv_maxrate 0"
    volumes:
      # Drop extra .pk3 map packs here to expand the rotation (optional).
      # They are symlinked into the mod dir at startup so the engine loads them.
      - ./maps:/warsow/maps_extra:ro
      # Persist server-written state (bans, logs) across restarts (optional).
      - warsow-state:/home/warsow/.local/share/warsow-2.1

volumes:
  warsow-state:
