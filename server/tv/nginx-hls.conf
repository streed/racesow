# Serves the HLS segment tree written by the tv-capture encoder.
#
# In production this lives on the game box on :80 — OUTSIDE the :443 Cloudflare
# mTLS (Authenticated Origin Pulls) gate, since players/CDN fetch segments
# without a client cert. Here it's a standalone nginx for the local stack.
server {
    listen 80;
    server_name _;

    # The wtv-hls volume is mounted at /srv/hls, so /hls/<id>/index.m3u8 ->
    # /srv/hls/<id>/index.m3u8.
    location /hls/ {
        root /srv;
        autoindex off;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            video/mp4                     m4s mp4;
        }

        # Segments (immutable once written) can be cached briefly by the CDN;
        # the manifest must never be cached or players get stuck on a stale window.
        location ~* \.(ts|m4s|mp4)$ {
            root /srv;
            add_header Cache-Control "public, max-age=10"        always;
            add_header Access-Control-Allow-Origin "*"           always;
        }
        location ~* \.m3u8$ {
            root /srv;
            add_header Cache-Control "no-cache, no-store"        always;
            add_header Access-Control-Allow-Origin "*"           always;
        }
    }

    location = /healthz { return 200 "ok\n"; }
}
