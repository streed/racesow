# Serves the HLS segment tree written by the tv-capture encoder — STANDALONE /
# local-stack REFERENCE config. It is not wired into any compose service.
#
# PRODUCTION serves the stream SAME-ORIGIN through the :443 racesow.org vhost
# (see the /hls location in deploy/nginx/racesow.conf), which needs no CORS at
# all — the absence of Access-Control-Allow-Origin is what blocks off-site
# browser players. Use THIS file only when the stream must be served from a
# DISTINCT origin (e.g. a stream-*.racesow.org host on :80, outside the :443
# Cloudflare mTLS gate, since players/CDN fetch segments without a client cert).
# It restricts cross-origin reads to the site origins instead of the blanket
# "*" that let ANY site embed the stream, and adds a best-effort Referer guard.

# Allowlist the origins permitted to read the stream cross-origin; any other
# Origin yields an empty value, so nginx emits NO ACAO header and the browser
# blocks the cross-origin read. localhost/127.0.0.1 keep the local stack
# working. Must sit at http scope — this file is included from within http{}.
map $http_origin $hls_cors {
    default                               "";
    "~^https://(www\.)?racesow\.org$"     $http_origin;
    "~^https?://localhost(:[0-9]+)?$"     $http_origin;
    "~^https?://127\.0\.0\.1(:[0-9]+)?$"  $http_origin;
}

server {
    listen 80;
    server_name _;

    # The wtv-hls volume is mounted at /srv/hls, so /hls/<id>/index.m3u8 ->
    # /srv/hls/<id>/index.m3u8.
    location /hls/ {
        root /srv;
        autoindex off;

        # Best-effort hotlink guard, inherited by the nested locations below (the
        # `if` must live in each one, since a matched nested location does not run
        # the parent's rewrite-phase `if`). `none`/`blocked` keep no-Referer
        # clients (CDN, native players) working; an off-site Referer is 403'd. A
        # native player/proxy can omit or forge the Referer, so this is defense in
        # depth, not a hard control.
        valid_referers none blocked racesow.org *.racesow.org localhost 127.0.0.1;

        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
            video/mp4                     m4s mp4;
        }

        # Segments (immutable once written) can be cached briefly by the CDN;
        # the manifest must never be cached or players get stuck on a stale window.
        location ~* \.(ts|m4s|mp4)$ {
            root /srv;
            if ($invalid_referer) { return 403; }
            add_header Cache-Control "public, max-age=10"    always;
            add_header Access-Control-Allow-Origin $hls_cors always;
            add_header Vary Origin                           always;
        }
        location ~* \.m3u8$ {
            root /srv;
            if ($invalid_referer) { return 403; }
            add_header Cache-Control "no-cache, no-store"    always;
            add_header Access-Control-Allow-Origin $hls_cors always;
            add_header Vary Origin                           always;
        }
    }

    location = /healthz { return 200 "ok\n"; }
}
