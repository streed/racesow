// ---------------------------------------------------------------------------
// server.cfg  --  Warsow 2.1.2 hrace (racemod) dedicated server
//
// Core identity/networking cvars are supplied on the command line by
// entrypoint.sh from environment variables; this file holds the race
// gameplay tuning. Everything here can be overridden via EXTRA_ARGS.
// ---------------------------------------------------------------------------

// --- Gameplay --------------------------------------------------------------
set g_gametype "hrace"
set g_instagib "0"
set g_timelimit "0"            // race maps are not time-limited
set g_warmup_timelimit "0"
set g_race_gametype "1"

// --- Movement / race feel --------------------------------------------------
set g_allow_selfdamage "0"     // no self damage on rockets/plasma
set g_allow_falldamage "0"     // classic race: no fall damage
set g_allow_bunny "1"          // bunnyhopping enabled
set g_projectile_touch_owner "1"
set g_disable_vote_gametype "1"
set rs_quad_fix "0"                 // 1 = quad boosts rocket-jump knockback (Q3/defrag style); testing
set rs_quad_knockback_scale "3"     // factor when rs_quad_fix 1 (Q3 g_quadfactor=3; ~2 ≈ Q3 rocket feel)

// --- Server behaviour ------------------------------------------------------
// Pure mode with a patched game module: our modules_racesow_21.pk3 is
// deliberately NOT pure-named (clients refuse to download .so pk3s), and
// sv_pure_forcemodulepk3 points the pure list at the stock modules pak that
// every client already has. The remaining pure entries are the stock
// *21pure.pk3 data paks (client-identical) plus our racemod_ui_v5_local.pk3
// client menu/HUD pak, which clients download automatically (it is
// pure-indexed as a referenced pak by GT_InitGametype in hrace.as).
set sv_pure "1"
set sv_pure_forcemodulepk3 "basewsw/modules_21.pk3"   // must be game-dir qualified
set sv_pps "40"                // snapshots/sec to clients; 40 keeps spectated
                               // players (incl. mesh mirror bots) smooth
set sv_maxrate "0"
set sv_compresspackets "1"
set sv_lastAutoUpdate "0"
set g_floodprotection_messages "6"
set g_floodprotection_seconds "4"
set g_floodprotection_penalty "3"

// --- Voting ----------------------------------------------------------------
set g_vote_allowed "1"
set g_vote_percent "51"
set g_vote_duration "20"
set sv_maxclients "16"

// --- Chat / MOTD -----------------------------------------------------------
set sv_motd "1"
set sv_motdstring "Welcome to a Dockerized Warsow race server - go fast!"

echo "server.cfg loaded: hrace race server ready"
