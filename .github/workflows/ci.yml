# Fast test lane, run on every push/PR (no Docker daemon needed):
#   web unit + HTTP API tests (throwaway PostgreSQL database per test),
#   the entrypoint env->cfg contract, the e2e pipeline that compiles the REAL
#   g_rs_api.cpp natives against the REAL web server (also on Postgres), the
#   mesh parser fuzz (ASan+UBSan), and the WR-demo filename port equivalence.
#
# The heavy Docker jobs — building the engine, booting the game server, a real
# client-connect handshake, and the web+game full-stack — live in e2e.yml.
name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: racesow
          POSTGRES_PASSWORD: racesow
          POSTGRES_DB: racesow
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U racesow"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # web tests (pg-util.js) and the e2e server both use this.
      TEST_PG_URL: postgres://racesow:racesow@127.0.0.1:5433/racesow
      DATABASE_URL: postgres://racesow:racesow@127.0.0.1:5433/racesow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: build deps for the e2e harnesses
        run: sudo apt-get update && sudo apt-get install -y g++ libcurl4-openssl-dev postgresql-client
      - name: web unit + API tests
        run: cd web && npm install && npm test
      - name: entrypoint contract test
        run: sh server/test/entrypoint.test.sh
      - name: end-to-end pipeline (real natives -> real API)
        run: sh e2e/run.sh
      - name: mesh parser fuzz (ASan + UBSan)
        run: sh e2e/mirror_fuzz_run.sh
      - name: WR-demo filename port equivalence
        run: node --test server/test/demoname.test.mjs
