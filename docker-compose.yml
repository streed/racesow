# Racesow data services: PostgreSQL + the stats website + the Discord record
# announcer.
#
#   docker compose up -d --build
#
# The race data lives in the postgres service (pgdata volume). The legacy
# SQLite file in ./data is kept mounted for the one-time migration and as a
# rollback artifact:
#   docker compose run --rm web node migrate-sqlite-to-pg.js /data/db.sqlite
#
# The Warsow *game server* is a separate, much heavier image; run it from
# ./server (see server/README.md).
# Bounded container logs everywhere: the docker default json-file driver has
# NO size cap, so a chatty (or crash-looping) service grows its log until the
# disk fills. Applied on the next `up -d` recreate of each service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: racesow-postgres
    restart: unless-stopped
    logging: *default-logging
    # Parallel-query workers pass data through POSIX shared memory (/dev/shm),
    # which Docker defaults to a cramped 64MB — too small once shared_buffers is
    # large and parallel plans kick in ("could not resize shared memory"). Give
    # them real room.
    shm_size: "1gb"
    # Tuned for this box (32GB RAM, 12 cores, NVMe SSD) and workload (small
    # ~210MB read-heavy DB fronted by Redis, plus periodic single-connection
    # aggregate rebuilds and light ingest writes). The stock alpine defaults
    # (shared_buffers=128MB, work_mem=4MB, effective_cache_size=4GB) badly
    # undersize the hardware. These -c flags override postgresql.conf at boot;
    # applied with a one-time container recreate (pgdata volume persists).
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=8GB"              # 25% RAM; caches the whole DB many times over
      - "-c"
      - "effective_cache_size=24GB"       # planner hint: OS caches the rest (favors index scans)
      - "-c"
      - "maintenance_work_mem=2GB"        # speeds the aggregate-rebuild index builds + VACUUM
      - "-c"
      - "work_mem=32MB"                   # per-op; safe at max_connections=100, real pool ~20
      - "-c"
      - "max_connections=100"             # ~20 real (10/replica x2) + headroom
      - "-c"
      - "random_page_cost=1.1"            # NVMe SSD: random ~= sequential
      - "-c"
      - "effective_io_concurrency=200"    # SSD can service many concurrent reads
      - "-c"
      - "max_worker_processes=12"         # = cores
      - "-c"
      - "max_parallel_workers=12"
      - "-c"
      - "max_parallel_workers_per_gather=4"
      - "-c"
      - "max_parallel_maintenance_workers=4"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "checkpoint_completion_target=0.9"  # spread checkpoint I/O to avoid write spikes
    environment:
      POSTGRES_USER: racesow
      POSTGRES_DB: racesow
      # Generate with: openssl rand -hex 24 (set it in .env)
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U racesow -d racesow"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Short-TTL response cache for the hot read endpoints (web/cache.js). Pure
  # cache — no persistence — so it is safe to lose on restart; capped memory
  # with LRU eviction so it can never grow unbounded.
  redis:
    image: redis:7-alpine
    container_name: racesow-redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build: ./web
    image: racesow-web:latest
    container_name: racesow-web
    # Graceful stops come from the SIGTERM handler in web/server.js (it runs
    # even with node as PID 1 — do NOT remove it in favor of this). init just
    # adds tini for zombie reaping; a web2 override replica works without it.
    init: true
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://racesow:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/racesow"
      # Response cache (web/cache.js). Empty/unset disables caching gracefully.
      REDIS_URL: "redis://redis:6379"
      # Canonical public origin for server-rendered share URLs + OG cards. Set
      # this in production (e.g. https://eu.frankfurt.racesow.org) so og:url/
      # og:image and the OG image footer never derive from the request Host
      # header (prevents host-header cache poisoning). Empty → per-request (dev).
      PUBLIC_ORIGIN: "${PUBLIC_ORIGIN:-}"
      # Optional shared secret for POST /api/ingest. Empty by default → prefer
      # per-server tokens: docker compose exec web node admin.js enroll "Name"
      INGEST_TOKEN: "${INGEST_TOKEN:-}"
      # Public base the game host serves WR .wd demos from (nginx /demos/ →
      # pakserver, plain HTTP). Empty → the "Download demo" button is omitted.
      DEMO_BASE_URL: "${DEMO_BASE_URL:-}"
      # WR ghost trajectory files (browser replay). On /data so they persist
      # across web image rebuilds and are shared by both replicas (the row is in
      # Postgres; the gzipped bytes live here).
      GHOST_DIR: "/data/ghosts"
      # Directory the db-backup sidecar publishes the weekly public backup into
      # (served at /backup/racesow-db-latest.zip). It lives under the ./data
      # mount below, so no extra volume is needed.
      BACKUP_DIR: "/data/backups"
      # Directory the heatmaps sidecar renders per-map top-down heatmap PNGs into
      # (served at /api/maps/:id/heatmap.png). Also under ./data, shared by both
      # web replicas; the sidecar writes, the web only reads.
      HEATMAP_DIR: "/data/heatmaps"
    volumes:
      # Legacy SQLite location — only read by migrate-sqlite-to-pg.js now; also
      # holds the WR ghost files (GHOST_DIR=/data/ghosts above), shared by both
      # replicas and persisted across rebuilds.
      - ./data:/data
      # WR ghost viewer meshes: converted on the box (node tools/bsp2gltf ...
      # --dir server/maps web/public/maps) and mounted READ-ONLY, so adding maps
      # needs no image rebuild and the multi-hundred-MB glbs are never baked in.
      - ./web/public/maps:/app/public/maps:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 4s
      retries: 3
      start_period: 20s

  # Weekly public database backup (see backup/README.md). A self-scheduling
  # sidecar — no host cron — that dumps the RACE RECORDS (stripped of admin
  # accounts, ingest tokens, and server IPs) into ./data/backups as a zip the
  # web service serves at /backup/racesow-db-latest.zip. Built on postgres:16 so
  # pg_dump matches the server version exactly.
  db-backup:
    build: ./backup
    image: racesow-db-backup:latest
    container_name: racesow-db-backup
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://racesow:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/racesow"
      OUT_DIR: /backups
      BACKUP_INTERVAL_SECONDS: "604800"   # weekly
      BACKUP_KEEP: "8"                     # ~2 months of dated archives
    volumes:
      # Same host dir the web service sees at /data/backups (./data:/data),
      # so the published zip is downloadable without an extra web mount.
      - ./data/backups:/backups

  # Nightly top-down map heatmaps (see web/heatmap.js + web/README.md). A
  # self-scheduling sidecar — no host cron — that aggregates every player's
  # fastest-line ghost trajectory per map into a transparent density PNG under
  # ./data/heatmaps, which the web serves at /api/maps/:id/heatmap.png. Runs the
  # same racesow-web image (it already has pg + the ghost files on /data); the
  # renderer is a zero-dependency PNG encoder. On boot it bootstraps any missing
  # map, then each cycle refreshes the maps that saw a finish in the past day.
  heatmaps:
    build: ./web
    image: racesow-web:latest
    container_name: racesow-heatmaps
    init: true
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://racesow:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/racesow"
      # Reads the per-(map,player) ghost trajectories the web/game write here …
      GHOST_DIR: "/data/ghosts"
      # … and writes <mapId>.png + <mapId>.json here, both under the shared ./data
      # mount so the web service (BACKUP_DIR/HEATMAP_DIR above) can serve them.
      HEATMAP_DIR: "/data/heatmaps"
      HEATMAP_INTERVAL_SECONDS: "86400"   # nightly full refresh (re-checks hourly)
      # Map .pk3 packs (read-only) so each heatmap is drawn over a top-down render
      # of the map geometry (bsp.js). Same packs the game server serves.
      MAPS_DIR: "/maps"
    volumes:
      - ./data:/data
      - ./server/maps:/maps:ro
    command: ["node", "heatmap.js", "--loop"]

  discord:
    build: ./discord
    image: racesow-discord:latest
    container_name: racesow-discord
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - web
    environment:
      # Paste your Discord webhook URL here (or use an .env file).
      DISCORD_WEBHOOK_URL: "${DISCORD_WEBHOOK_URL:-}"
      # The announcer polls the stats API (no database access needed).
      API_URL: "http://web:8080"
      STATE_PATH: /state/announcer.json
      POLL_INTERVAL: "300"
      ANNOUNCE_MAX_RANK: "1"        # 1 = world records only
      SITE_URL: "http://localhost:8080"
    volumes:
      - announcer-state:/state

  # NOTE: there is no collector service anymore — the game server POSTs every
  # finish straight to /api/ingest itself (racelog.as -> RS_ApiReportRace
  # native; INGEST_URL/INGEST_TOKEN in server/.env). collector/ remains in the
  # tree only for feeding the site from a stock, unmodified race server (see
  # AGENT.md "basic tier").

  # One-shot: seed the game server's topscores files from the race DB so the
  # in-game `top` lists reflect the central records (merge-only, never loses a
  # local record). Run manually, then restart the game server:
  #   docker compose --profile seed run --rm seed-topscores
  #   docker compose -f server/docker-compose.yml restart
  seed-topscores:
    build: ./web
    image: racesow-web:latest
    profiles: ["seed"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://racesow:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/racesow"
      TOPSCORES_DIR: /topscores/race
    volumes:
      - ./server/topscores:/topscores
    command: ["node", "seed-topscores.js"]

volumes:
  announcer-state:
  pgdata:
